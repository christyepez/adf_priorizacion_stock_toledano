resources:
  jobs:
    job_ext_sharepoint_priorizacion_stock:
      name: ${bundle.target}_ext_sharepoint_priorizacion_stock
      tags:
        proyecto: priorizacion-stock-toledano
        pipeline_adf_origen: ext_sharepoint_priorizacion_stock
        sistema_fuente: sharepoint
      job_clusters:
        - job_cluster_key: job_cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 2
      parameters:
        - name: ambiente
          default: ${var.ambiente}
        - name: Proceso
          default: Modelo_Priorizacion_Stock
        - name: SistemaFuente
          default: sharepoint
        - name: AñoMesDiaInicial
          default: "0"
        - name: AñoMesDiaFinal
          default: "0"
        - name: modo_control
          default: get_control_cargas
        - name: modo_ejecucion
          default: normal
        - name: emails
          default: ""
      tasks:
        - task_key: ext_sharepoint_priorizacion_stock
          job_cluster_key: job_cluster
          notebook_task:
            notebook_path: ../../notebooks/02_extraccion/nb_ext_sharepoint_priorizacion_stock.py
            base_parameters:
              ambiente: "{{job.parameters.ambiente}}"
              Proceso: "{{job.parameters.Proceso}}"
              SistemaFuente: "{{job.parameters.SistemaFuente}}"
              AñoMesDiaInicial: "{{job.parameters.AñoMesDiaInicial}}"
              AñoMesDiaFinal: "{{job.parameters.AñoMesDiaFinal}}"
              modo_ejecucion: "{{job.parameters.modo_ejecucion}}"
              fail_fast: "true"
              secret_scope: ${var.secret_scope}
              storage_account: ${var.storage_account}
              sql_control_server_secret: ${var.sql_control_server_secret}
              sql_control_database_secret: ${var.sql_control_database_secret}
              sql_control_username_secret: ${var.sql_control_username_secret}
              sql_control_password_secret: ${var.sql_control_password_secret}
              sharepoint_base_url_secret: ${var.sharepoint_base_url_secret}
              sharepoint_token_secret: ${var.sharepoint_token_secret}
              sharepoint_client_id_secret: ${var.sharepoint_client_id_secret}
              sharepoint_client_secret_secret: ${var.sharepoint_client_secret_secret}
              sharepoint_tenant_id_secret: ${var.sharepoint_tenant_id_secret}
