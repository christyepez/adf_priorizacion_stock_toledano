resources:
  jobs:
    job_full_priorizacion_stock:
      name: ${bundle.target}_full_priorizacion_stock
      tags:
        proyecto: priorizacion-stock-toledano
        modelo: Modelo_Priorizacion_Stock
        ambiente: ${var.ambiente}
      job_clusters:
        - job_cluster_key: ${var.job_cluster_key}
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 2
      parameters:
        - name: ambiente
          default: ${var.ambiente}
        - name: Proceso
          default: Modelo_Priorizacion_Stock
        - name: SistemaFuente
          default: all
        - name: AñoMesDiaInicial
          default: "0"
        - name: AñoMesDiaFinal
          default: "0"
        - name: modo_control
          default: get_control_cargas
        - name: modo_ejecucion
          default: normal
        - name: emails
          default: ""
      tasks:
        - task_key: audit_start
          job_cluster_key: ${var.job_cluster_key}
          notebook_task:
            notebook_path: ../../notebooks/06_operacion/03_audit_start.py
            base_parameters:
              ambiente: "{{job.parameters.ambiente}}"
              Proceso: "{{job.parameters.Proceso}}"
              SistemaFuente: "{{job.parameters.SistemaFuente}}"
              modo_control: "{{job.parameters.modo_control}}"
              modo_ejecucion: "{{job.parameters.modo_ejecucion}}"
              run_id: "{{job.run_id}}"
              execution_id: "{{job.run_id}}"
              catalog_gold: ${var.catalog_gold}
              schema_atlas: ${var.schema_atlas}

        - task_key: ext_saphana_priorizacion_stock
          depends_on:
            - task_key: audit_start
          job_cluster_key: ${var.job_cluster_key}
          notebook_task:
            notebook_path: ../../notebooks/02_extraccion/01_nb_ext_saphana_priorizacion_stock.py
            base_parameters:
              ambiente: "{{job.parameters.ambiente}}"
              Proceso: "{{job.parameters.Proceso}}"
              SistemaFuente: SapHana
              AñoMesDiaInicial: "{{job.parameters.AñoMesDiaInicial}}"
              AñoMesDiaFinal: "{{job.parameters.AñoMesDiaFinal}}"
              modo_ejecucion: "{{job.parameters.modo_ejecucion}}"
              fail_fast: "true"
              secret_scope: ${var.secret_scope}
              storage_account_name: ${var.storage_account_name}
              sql_control_server: ${var.sql_control_server}
              sql_control_database: ${var.sql_control_database}
              sql_control_schema: ${var.sql_control_schema}
              sql_control_table: ${var.sql_control_table}
              sql_control_read_mode: ${var.sql_control_read_mode}
              sql_control_spark_sql: ${var.sql_control_spark_sql}
              sql_control_spark_relation: ${var.sql_control_spark_relation}
              sql_control_server_secret: ${var.sql_control_server_secret}
              sql_control_database_secret: ${var.sql_control_database_secret}
              sql_control_username_secret: ${var.sql_control_username_secret}
              sql_control_password_secret: ${var.sql_control_password_secret}
              sql_control_encrypt: ${var.sql_control_encrypt}
              sql_control_trust_server_certificate: ${var.sql_control_trust_server_certificate}
              sap_hana_server_secret: ${var.sap_hana_server_secret}
              sap_hana_port_secret: ${var.sap_hana_port_secret}
              sap_hana_username_secret: ${var.sap_hana_username_secret}
              sap_hana_password_secret: ${var.sap_hana_password_secret}
              sap_hana_driver: ${var.sap_hana_driver}
              sap_hana_propietario_fuente: ${var.sap_hana_propietario_fuente}

        - task_key: ext_sharepoint_priorizacion_stock
          depends_on:
            - task_key: ext_saphana_priorizacion_stock
          job_cluster_key: ${var.job_cluster_key}
          notebook_task:
            notebook_path: ../../notebooks/02_extraccion/02_nb_ext_sharepoint_priorizacion_stock.py
            base_parameters:
              ambiente: "{{job.parameters.ambiente}}"
              Proceso: "{{job.parameters.Proceso}}"
              SistemaFuente: sharepoint
              AñoMesDiaInicial: "{{job.parameters.AñoMesDiaInicial}}"
              AñoMesDiaFinal: "{{job.parameters.AñoMesDiaFinal}}"
              modo_ejecucion: "{{job.parameters.modo_ejecucion}}"
              fail_fast: "true"
              secret_scope: ${var.secret_scope}
              storage_account_name: ${var.storage_account_name}
              sql_control_server: ${var.sql_control_server}
              sql_control_database: ${var.sql_control_database}
              sql_control_schema: ${var.sql_control_schema}
              sql_control_table: ${var.sql_control_table}
              sql_control_read_mode: ${var.sql_control_read_mode}
              sql_control_spark_sql: ${var.sql_control_spark_sql}
              sql_control_spark_relation: ${var.sql_control_spark_relation}
              sql_control_server_secret: ${var.sql_control_server_secret}
              sql_control_database_secret: ${var.sql_control_database_secret}
              sql_control_username_secret: ${var.sql_control_username_secret}
              sql_control_password_secret: ${var.sql_control_password_secret}
              sql_control_encrypt: ${var.sql_control_encrypt}
              sql_control_trust_server_certificate: ${var.sql_control_trust_server_certificate}
              sharepoint_base_url: ${var.sharepoint_base_url}
              sharepoint_auth_mode: ${var.sharepoint_auth_mode}
              sharepoint_token_secret: ${var.sharepoint_token_secret}
              sharepoint_client_id_secret: ${var.sharepoint_client_id_secret}
              sharepoint_client_secret_secret: ${var.sharepoint_client_secret_secret}
              sharepoint_tenant_id_secret: ${var.sharepoint_tenant_id_secret}
              sharepoint_site_id_secret: ${var.sharepoint_site_id_secret}
              sharepoint_drive_id_secret: ${var.sharepoint_drive_id_secret}
              sharepoint_propietario_fuente: ${var.sharepoint_propietario_fuente}

        - task_key: bronze_to_silver_sap
          depends_on:
            - task_key: ext_sharepoint_priorizacion_stock
          job_cluster_key: ${var.job_cluster_key}
          notebook_task:
            notebook_path: ../../notebooks/03_transformacion/01_sap.py
            base_parameters:
              tabla: fact_cv_m_ofertas_doc_ventas
              ambiente: "{{job.parameters.ambiente}}"
              Proceso: "{{job.parameters.Proceso}}"
              SistemaFuente: SapHana
              modo_ejecucion: "{{job.parameters.modo_ejecucion}}"
              catalog_bronze: ${var.catalog_bronze}
              catalog_silver: ${var.catalog_silver}
              schema_sap: ${var.schema_sap}
              storage_account_name: ${var.storage_account_name}

        - task_key: bronze_to_silver_sap_cv_lo_pedido
          depends_on:
            - task_key: bronze_to_silver_sap
          job_cluster_key: ${var.job_cluster_key}
          notebook_task:
            notebook_path: ../../notebooks/03_transformacion/01_sap.py
            base_parameters:
              tabla: fact_cv_lo_pedido
              ambiente: "{{job.parameters.ambiente}}"
              Proceso: "{{job.parameters.Proceso}}"
              SistemaFuente: SapHana
              modo_ejecucion: "{{job.parameters.modo_ejecucion}}"
              catalog_bronze: ${var.catalog_bronze}
              catalog_silver: ${var.catalog_silver}
              schema_sap: ${var.schema_sap}
              storage_account_name: ${var.storage_account_name}

        - task_key: bronze_to_silver_sharepoint
          depends_on:
            - task_key: bronze_to_silver_sap_cv_lo_pedido
          job_cluster_key: ${var.job_cluster_key}
          notebook_task:
            notebook_path: ../../notebooks/03_transformacion/02_sharepoint.py
            base_parameters:
              tabla: grupos_priorizacion
              ambiente: "{{job.parameters.ambiente}}"
              Proceso: "{{job.parameters.Proceso}}"
              SistemaFuente: sharepoint
              modo_ejecucion: "{{job.parameters.modo_ejecucion}}"
              catalog_bronze: ${var.catalog_bronze}
              catalog_silver: ${var.catalog_silver}
              schema_sharepoint: ${var.schema_sharepoint}
              storage_account_name: ${var.storage_account_name}

        - task_key: bronze_to_silver_sharepoint_priorizaciones_previas
          depends_on:
            - task_key: bronze_to_silver_sharepoint
          job_cluster_key: ${var.job_cluster_key}
          notebook_task:
            notebook_path: ../../notebooks/03_transformacion/02_sharepoint.py
            base_parameters:
              tabla: priorizaciones_previas
              ambiente: "{{job.parameters.ambiente}}"
              Proceso: "{{job.parameters.Proceso}}"
              SistemaFuente: sharepoint
              modo_ejecucion: "{{job.parameters.modo_ejecucion}}"
              catalog_bronze: ${var.catalog_bronze}
              catalog_silver: ${var.catalog_silver}
              schema_sharepoint: ${var.schema_sharepoint}
              storage_account_name: ${var.storage_account_name}

        - task_key: modelo_creacion_indice_priorizacion
          depends_on:
            - task_key: bronze_to_silver_sharepoint_priorizaciones_previas
          job_cluster_key: ${var.job_cluster_key}
          notebook_task:
            notebook_path: ../../notebooks/04_modelo/02_nb_creacion_indice_priorizacion.py
            base_parameters:
              ambiente: "{{job.parameters.ambiente}}"
              Proceso: "{{job.parameters.Proceso}}"
              modo_ejecucion: "{{job.parameters.modo_ejecucion}}"
              execution_id: "{{job.run_id}}"
              fecha_filtro: ""
              catalog_silver: ${var.catalog_silver}
              catalog_gold: ${var.catalog_gold}
              schema_sap: ${var.schema_sap}
              schema_sharepoint: ${var.schema_sharepoint}
              schema_atlas: ${var.schema_atlas}

        - task_key: quality_checks
          depends_on:
            - task_key: modelo_creacion_indice_priorizacion
          job_cluster_key: ${var.job_cluster_key}
          notebook_task:
            notebook_path: ../../notebooks/06_operacion/01_quality_checks.py
            base_parameters:
              ambiente: "{{job.parameters.ambiente}}"
              Proceso: "{{job.parameters.Proceso}}"
              execution_id: "{{job.run_id}}"
              catalog_bronze: ${var.catalog_bronze}
              catalog_silver: ${var.catalog_silver}
              catalog_gold: ${var.catalog_gold}
              schema_sap: ${var.schema_sap}
              schema_sharepoint: ${var.schema_sharepoint}
              schema_atlas: ${var.schema_atlas}

        - task_key: reconciliation_adf
          depends_on:
            - task_key: quality_checks
          job_cluster_key: ${var.job_cluster_key}
          notebook_task:
            notebook_path: ../../notebooks/06_operacion/02_reconciliation_adf.py
            base_parameters:
              ambiente: "{{job.parameters.ambiente}}"
              Proceso: "{{job.parameters.Proceso}}"
              execution_id: "{{job.run_id}}"
              modo_control: "{{job.parameters.modo_control}}"
              modo_ejecucion: "{{job.parameters.modo_ejecucion}}"
              catalog_gold: ${var.catalog_gold}
              schema_atlas: ${var.schema_atlas}
              adf_comparison_table: ""
              tolerance_pct: "0"

        - task_key: publicar_resultados_sql
          depends_on:
            - task_key: reconciliation_adf
          job_cluster_key: ${var.job_cluster_key}
          notebook_task:
            notebook_path: ../../notebooks/05_publicacion/01_sql_server.py
            base_parameters:
              ambiente: "{{job.parameters.ambiente}}"
              Proceso: "{{job.parameters.Proceso}}"
              modo_ejecucion: "{{job.parameters.modo_ejecucion}}"
              catalog_gold: ${var.catalog_gold}
              schema_atlas: ${var.schema_atlas}
              secret_scope: ${var.secret_scope}
              sql_publication_server: ${var.sql_publication_server}
              sql_publication_database: ${var.sql_publication_database}
              sql_publication_username_secret: ${var.sql_publication_username_secret}
              sql_publication_password_secret: ${var.sql_publication_password_secret}
              sql_publication_encrypt: ${var.sql_publication_encrypt}
              sql_publication_trust_server_certificate: ${var.sql_publication_trust_server_certificate}
              modo_publicacion: truncate_insert
              target_schema: ${var.sql_publication_schema}
              target_table: ${var.sql_publication_table}

        - task_key: notify_success
          depends_on:
            - task_key: publicar_resultados_sql
          job_cluster_key: ${var.job_cluster_key}
          notebook_task:
            notebook_path: ../../notebooks/06_operacion/04_notify.py
            base_parameters:
              ambiente: "{{job.parameters.ambiente}}"
              Proceso: "{{job.parameters.Proceso}}"
              run_id: "{{job.run_id}}"
              execution_id: "{{job.run_id}}"
              status: SUCCEEDED
              emails: "{{job.parameters.emails}}"
              message: "Fin exitoso del proceso Modelo_Priorizacion_Stock"
              subject: "Priorizacion Stock Toledano - SUCCEEDED"
              name: "Priorizacion Stock Toledano"
              secret_scope: ${var.secret_scope}
              notification_endpoint_secret: ${var.notification_endpoint_secret}
              notification_enabled: ${var.notification_enabled}
              catalog_gold: ${var.catalog_gold}
              schema_atlas: ${var.schema_atlas}

        - task_key: audit_finish
          depends_on:
            - task_key: notify_success
          job_cluster_key: ${var.job_cluster_key}
          notebook_task:
            notebook_path: ../../notebooks/06_operacion/05_audit_finish.py
            base_parameters:
              ambiente: "{{job.parameters.ambiente}}"
              Proceso: "{{job.parameters.Proceso}}"
              SistemaFuente: "{{job.parameters.SistemaFuente}}"
              modo_control: "{{job.parameters.modo_control}}"
              modo_ejecucion: "{{job.parameters.modo_ejecucion}}"
              run_id: "{{job.run_id}}"
              execution_id: "{{job.run_id}}"
              catalog_gold: ${var.catalog_gold}
              schema_atlas: ${var.schema_atlas}
              status: SUCCEEDED
              message: "Fin exitoso del pipeline"
